<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EaseMotion CSS — Pulse Animation Example</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="demo-header">
    <h1>Pulse Animation Example</h1>
    <p>Built with EaseMotion CSS utility classes</p>
  </header>

  <main class="demo-container">

    <!-- Buttons -->
    <section class="demo-section">
      <h2>Buttons</h2>
      <div class="demo-row">
        <button class="btn pulse">Subscribe</button>
        <button class="btn btn-outline pulse pulse-slow">Notify Me</button>
      </div>
    </section>

    <!-- Cards -->
    <section class="demo-section">
      <h2>Cards</h2>
      <div class="demo-row">
        <div class="card pulse">
          <h3>Featured Plan</h3>
          <p>Highlighted with a subtle pulse to draw attention.</p>
        </div>
      </div>
    </section>

    <!-- Icons -->
    <section class="demo-section">
      <h2>Icons</h2>
      <div class="demo-row">
        <div class="icon-circle pulse pulse-fast">🔔</div>
        <div class="icon-circle pulse">❤️</div>
      </div>
    </section>

    <!-- Notifications -->
    <section class="demo-section">
      <h2>Notifications</h2>
      <div class="demo-row">
        <div class="notification pulse">
          <span class="dot pulse pulse-fast"></span>
          New message received
        </div>
      </div>
    </section>

    <!-- Badges -->
    <section class="demo-section">
      <h2>Badges</h2>
      <div class="demo-row">
        <span class="badge pulse">New</span>
        <span class="badge badge-alert pulse pulse-fast">Live</span>
      </div>
    </section>

  </main>

  <footer class="demo-footer">
    <p>EaseMotion CSS — Standard Examples</p>
  </footer>

</body>
</html>
